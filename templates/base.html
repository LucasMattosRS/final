<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditoria de Projetos Elétricos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <aside class="rail">
    <div class="rail__brand">
      <span class="rail__mark"><i class="bi bi-lightning-charge-fill"></i></span>
      <span class="rail__name">Leitor<br><b>elétrico</b></span>
    </div>

    <p class="rail__label">Operação</p>
    <nav class="rail__nav">
      <a href="/dashboard" class="{{ 'is-active' if request.path == '/dashboard' else '' }}">
        <i class="bi bi-grid-1x2"></i><span>Painel</span>
      </a>
      <a href="/" class="{{ 'is-active' if request.path in ['/', '/processar'] else '' }}">
        <i class="bi bi-cloud-arrow-up"></i><span>Processar projeto</span>
      </a>
      <a href="/historico" class="{{ 'is-active' if request.path == '/historico' else '' }}">
        <i class="bi bi-clock-history"></i><span>Histórico</span>
      </a>
      <a href="/configuracoes" class="{{ 'is-active' if request.path == '/configuracoes' else '' }}">
        <i class="bi bi-sliders"></i><span>Configurações</span>
      </a>
    </nav>

    <div class="rail__foot">
      <span class="dot dot--ok"></span> Aprovado
      <span class="dot dot--warn"></span> Revisar
      <span class="dot dot--crit"></span> Crítico
    </div>
  </aside>

  <main class="workspace">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
